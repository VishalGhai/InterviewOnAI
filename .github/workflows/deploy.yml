name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create config.js
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "API_KEY length: ${#API_KEY}"
          if [ -n "$API_KEY" ]; then
            printf 'const _INJECTED_KEY = "%s";\nconst GEMINI_API_KEY = localStorage.getItem("gemini-api-key")\n    || (_INJECTED_KEY !== "YOUR_GEMINI_API_KEY_HERE" ? _INJECTED_KEY : "");\n' "$API_KEY" > config.js
            echo "config.js created with injected key"
          else
            printf 'const _INJECTED_KEY = "YOUR_GEMINI_API_KEY_HERE";\nconst GEMINI_API_KEY = localStorage.getItem("gemini-api-key")\n    || (_INJECTED_KEY !== "YOUR_GEMINI_API_KEY_HERE" ? _INJECTED_KEY : "");\n' > config.js
            echo "config.js created with placeholder (no secret found)"
          fi
          cat config.js | head -c 40
          echo "..."

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
