<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InterviewOnAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css?v=12">
</head>
<body>
    <!-- History Sidebar -->
    <aside class="history-sidebar" id="historySidebar">
        <div class="history-header">
            <h3>Past Interviews</h3>
            <button class="history-close" id="historyClose" aria-label="Close sidebar">✕</button>
        </div>
        <div class="history-list" id="historyList">
            <div class="history-loading">Loading...</div>
        </div>
    </aside>
    <div class="history-overlay" id="historyOverlay"></div>

    <div class="container">
        <header class="header">
            <h1>InterviewOn<span class="accent">AI</span></h1>
            <div class="role-headline">
                <span class="role-headline-static">Ace your next interview as a</span>
                <div class="role-cycler-wrap">
                    <span class="role-cycler" id="roleCycler"></span>
                </div>
            </div>
        </header>

        <main class="landing">
            <section class="jd-section">
                <textarea id="jdInput" placeholder="Paste your job description here..." rows="6"></textarea>
                
                <div class="config-row">
                    <div class="config-item">
                        <label for="questionCount">Questions</label>
                        <select id="questionCount">
                            <option value="free" selected>Free Tier</option>
                            <option value="5">5</option>
                            <option value="10">10</option>
                            <option value="15">15</option>
                            <option value="20">20</option>
                        </select>
                    </div>
                    <div class="config-item">
                        <label for="difficulty">Difficulty</label>
                        <select id="difficulty">
                            <option value="easy">Easy</option>
                            <option value="easy-medium" selected>Easy → Medium</option>
                            <option value="easy-medium-hard">Easy → Medium → Hard</option>
                        </select>
                    </div>
                </div>

                <button id="startBtn" class="btn-primary">Start Interview</button>
            </section>

            <div class="divider">
                <span>or prepare by topic</span>
            </div>

            <section class="topics-section">
                <div class="topic-config">
                    <select id="topicQuestionCount">
                        <option value="5" selected>5 Questions (₹49)</option>
                        <option value="10">10 Questions (₹99)</option>
                        <option value="15">15 Questions (₹149)</option>
                        <option value="20">20 Questions (₹199)</option>
                    </select>
                </div>
                <div class="topics-grid" id="topicsGrid"></div>
            </section>
        </main>
    </div>

    <!-- API Key Modal -->

    <script>document.body.style.visibility='hidden';</script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/error-handler.js?v=13"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="js/supabase-client.js?v=11"></script>
    <script src="js/database.js?v=11"></script>
    <script src="js/auth.js?v=12"></script>
    <script>
        (async () => {
            try {
                if (!(await AuthManager.isLoggedIn())) { window.location.href = 'login.html'; return; }
                document.body.style.visibility = 'visible';
                AuthManager.renderUserBadge();
            } catch (e) {
                ErrorHandler.capture(e, {
                    internalCode: 'AUTH-PAGE-GUARD-INDEX-001',
                    context: 'index.authGuard',
                    publicPrefix: 'AUTH'
                });
                window.location.href = 'login.html';
            }
        })();
    </script>
    <script src="js/theme.js?v=12"></script>
    <script>
    (function () {
        const roles = [
            'Software Engineer',
            'Senior Software Engineer',
            'Full Stack Developer',
            'Frontend Developer',
            'Backend Developer',
            'DevOps Engineer',
            'Data Engineer',
            'ML Engineer',
            'Engineering Manager',
            'Tech Lead'
        ];
        let idx = 0;
        const el = document.getElementById('roleCycler');
        if (!el) return;
        function showNext() {
            el.classList.remove('role-in');
            el.classList.add('role-out');
            setTimeout(() => {
                idx = (idx + 1) % roles.length;
                el.textContent = roles[idx];
                el.classList.remove('role-out');
                el.classList.add('role-in');
            }, 350);
        }
        el.textContent = roles[0];
        el.classList.add('role-in');
        setInterval(showNext, 2000);
    })();
    </script>
    <script src="config.js"></script>
    <script src="js/app.js?v=12"></script>
    <script src="js/history.js?v=11"></script>
</body>
</html>
