<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InterviewOnAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>InterviewOn<span class="accent">AI</span></h1>
            <p class="subtitle">AI-powered interview preparation</p>
        </header>

        <main class="landing">
            <section class="jd-section">
                <textarea id="jdInput" placeholder="Paste your job description here..." rows="6"></textarea>
                
                <div class="config-row">
                    <div class="config-item">
                        <label for="questionCount">Questions</label>
                        <select id="questionCount">
                            <option value="free" selected>Free Tier</option>
                            <option value="5">5</option>
                            <option value="10">10</option>
                            <option value="15">15</option>
                            <option value="20">20</option>
                        </select>
                    </div>
                    <div class="config-item">
                        <label for="difficulty">Difficulty</label>
                        <select id="difficulty">
                            <option value="easy">Easy</option>
                            <option value="easy-medium" selected>Easy → Medium</option>
                            <option value="easy-medium-hard">Easy → Medium → Hard</option>
                        </select>
                    </div>
                </div>

                <button id="startBtn" class="btn-primary">Start Interview</button>
            </section>

            <div class="divider">
                <span>or prepare by topic</span>
            </div>

            <section class="topics-section">
                <div class="topics-grid" id="topicsGrid"></div>
            </section>
        </main>
    </div>

    <!-- API Key Modal -->
    <div class="apikey-overlay" id="apikeyOverlay">
        <div class="apikey-modal">
            <h2>Enter Gemini API Key</h2>
            <p>Get a free key from <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">Google AI Studio</a></p>
            <input type="password" id="apikeyInput" placeholder="Paste your API key here..." autocomplete="off">
            <button id="apikeySaveBtn" class="btn-primary">Save & Continue</button>
        </div>
    </div>

    <script>document.body.style.visibility='hidden';</script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js?v=3"></script>
    <script src="js/database.js?v=3"></script>
    <script src="js/auth.js?v=3"></script>
    <script>
        (async () => {
            try {
                if (!(await AuthManager.isLoggedIn())) { window.location.href = 'login.html'; return; }
                document.body.style.visibility = 'visible';
                AuthManager.renderUserBadge();
            } catch (e) {
                console.error('Auth check failed:', e);
                window.location.href = 'login.html';
            }
        })();
    </script>
    <script src="config.js"></script>
    <script src="js/theme.js?v=3"></script>
    <script src="js/app.js?v=3"></script>
</body>
</html>
